#inspiration: https://gist.github.com/rishitells/3c4536131819cff4eba2c8ab5bbb4570
# build improvements from https://maciejz.dev/gitlab-ci-cd-series-building-angular-application/

# Container image to use for all jobs.
# Best-practice: use a specific version rather than "latest"
image: node:20.18-bullseye

stages:
  - lint
  - build
  - test
  - release
  - deploy

# Run these jobs only when commits are pushed to main and staging
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'

default:
  cache:  # Cache modules in between jobs for the same branch if package-lock.json file changes
    key: 
      prefix: $CI_COMMIT_REF_NAME
      files:
        - server/package-lock.json
        - client/package-lock.json
    paths:
    #.npm is a cache directory that contains packages already downloaded. npm will lookup packages in .npm first when installing.
      - server/.npm/
      - client/.npm
  # run this before every job; will hit the cache first
  before_script:
   # when a script gets long, you should put into a file 
   # in your repo (e.g. ci/setup.sh) and call it here
   # npm ci installs exactly the versions in the package-lock.json, this is important to ensure that testing/production environments match local dev environments
   # Tell npm to cache modules in .npm
   # The --prefer-offline option makes npm avoid fetching a module from the package repository unless it's missing from the cache
   - cd server && npm ci --cache .npm --prefer-offline && cd ../client && npm ci --cache .npm --prefer-offline && cd ..

lint-server:
  stage: lint
  script:
    - cd server && npm run lint
  allow_failure: false

lint-client:
  stage: lint
  script:
    - cd client && npm run lint
  allow_failure: false

build-frontend:
  stage: build
  script:
    - cd client && npm run build
  artifacts:
    expire_in: 1 days
    when: on_success
    paths:
      - client/dist

